<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>JCW Lunacy — Analytics</title>
<style>
  :root{--bg:#0b0b0d;--panel:#141418;--seam:#2c2340;--gold:#ffd028;--acid:#5bd62b;--hot:#ff3fa4;--pit:#000;--txt:#e8e6ef;--mut:#9a94ad;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;line-height:1.5}
  header{padding:16px 20px;border-bottom:1px solid var(--seam);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;letter-spacing:.04em}
  header .j{color:var(--acid)}header .c{color:var(--hot)}header .w{color:var(--gold)}
  .wrap{max-width:1080px;margin:0 auto;padding:20px}
  .card{background:var(--panel);border:1px solid var(--seam);border-radius:10px;padding:16px;margin-bottom:18px}
  label{display:block;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}
  button{background:var(--acid);color:#000;border:none;border-radius:6px;padding:9px 16px;font:inherit;font-weight:700;cursor:pointer;letter-spacing:.03em}
  button.ghost{background:transparent;color:var(--txt);border:1px solid var(--seam)}
  button.sm{padding:5px 10px;font-size:12px}
  .muted{color:var(--mut);font-size:12.5px}
  .status{font-size:12.5px;padding:6px 0}
  .ok{color:var(--acid)}.err{color:var(--hot)}
  .item{border:1px solid var(--seam);border-radius:8px;padding:12px;margin-bottom:10px;background:#101015}
  a{color:var(--acid)}
  pre{background:#000;padding:10px;border-radius:6px;overflow:auto;color:var(--gold);font-size:12px}
</style>
</head>
<body>
<header>
  <h1><span class="j">J</span><span class="c">C</span><span class="w">W</span> Lunacy — Analytics</h1>
  <button class="ghost sm" id="statsReload">Refresh</button>
  <span class="status" id="statsStatus"></span>
</header>
<div class="wrap">

  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px" id="statCards"></div>
  </div>
  <div class="card"><label>Visits — last 14 days</label><div id="statDays" class="muted">—</div></div>
  <div class="card"><label>Views by section</label><div id="statViews" class="muted">—</div></div>
  <div class="card"><label>Ticket clicks <span class="muted">(people the site sent to the ticket pages)</span></label><div id="statTickets" class="muted">—</div></div>
  <div class="card"><label>Episodes watched</label><div id="statEps" class="muted">—</div></div>
  <div class="card"><label>Vote results</label><div id="statPolls" class="muted">—</div></div>
  <div class="card"><label>Favorite wrestlers <span class="muted">(set in the Juggalo Locker)</span></label><div id="statFavs" class="muted">—</div></div>
  <div class="card"><label>Top Juggalo Lockers</label><div id="statLockers" class="muted">—</div></div>
  <div class="card" id="rulesHint" style="display:none"><label>Fix data access (2 min)</label><div class="muted">
    Some data is blocked by your Firebase rules. Open
    <a href="https://console.firebase.google.com/project/jcw-lunacy/database/jcw-lunacy-default-rtdb/rules" target="_blank" rel="noopener">Firebase Console → Realtime Database → Rules</a>
    and make sure the blocked paths allow read — and that <b>stats</b> allows write, so the site can count visits:
    <pre id="rulesPre"></pre>
    Click <b>Publish</b> in the console, then hit Refresh here.
  </div></div>

</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
  function status(msg,cls){const el=$('statsStatus');el.textContent=msg;el.className='status '+(cls||'');}

  $('rulesPre').textContent=JSON.stringify({rules:{
    chat:{'.read':true,'.write':true},
    polls:{'.read':true,'.write':true},
    stats:{'.read':true,'.write':true},
    lockers:{'.read':true,'$uid':{'.write':'auth != null && auth.uid === $uid'}}
  }},null,2);

  const JCW_FB={apiKey:"AIzaSyCDCfMShCyyFZSC3qp1t75Rx_0fOfH3L_U",authDomain:"jcw-lunacy.firebaseapp.com",databaseURL:"https://jcw-lunacy-default-rtdb.firebaseio.com",projectId:"jcw-lunacy",storageBucket:"jcw-lunacy.firebasestorage.app",messagingSenderId:"743418158514",appId:"1:743418158514:web:d167d515509974fbf5d8ab"};
  const POLL_LABELS={
    'dani-revenge':{q:"Dani’s Revenge — how does it end with Barnabas?",o:['Dani gets her payback','Barnabas weasels out again','Father & daughter join forces']},
    'tag-contenders':{q:'#1 Contenders — who gets the Tag Title shot?',o:['Willie Mack & 2 Tuff Tony','The Backseat Boyz']},
    'bm-lunacy':{q:'Bloodymania 19 — Lunacy World',o:['Caleb Konley retains','New champion']},
    'bm-heavy':{q:'Bloodymania 19 — World Heavyweight',o:['Josh Bishop retains','New champion']},
    'father':{q:'Who is the father of Jasmin’s baby? (closed)',o:['Vince Russo','Joel Gertner','Big Vito','Somebody nobody suspects']}
  };

  let statsDB=null;
  function loadScript(src){return new Promise((res,rej)=>{const sc=document.createElement('script');sc.src=src;sc.onload=res;sc.onerror=()=>rej(new Error('could not load '+src));document.head.appendChild(sc);});}
  async function statsInit(){
    if(statsDB)return statsDB;
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    firebase.initializeApp(JCW_FB);
    statsDB=firebase.database();
    return statsDB;
  }
  function barRow(label,v,max,extra){
    const pct=max?Math.round(v/max*100):0;
    return '<div style="display:flex;align-items:center;gap:10px;margin:5px 0">'+
      '<div style="flex:0 0 160px;font-size:12.5px" class="muted">'+esc(label)+'</div>'+
      '<div style="flex:1;background:#000;border:1px solid var(--seam);border-radius:4px;height:16px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--acid)"></div></div>'+
      '<div style="flex:0 0 90px;text-align:right;font-weight:700">'+v+(extra||'')+'</div></div>';
  }
  async function statsLoad(){
    status('Loading…');
    try{
      const db=await statsInit();
      const get=async p=>{try{const v=(await db.ref(p).once('value')).val();return v||{};}catch(e){return {__err:true};}};
      const st=await get('stats');
      const polls=await get('polls');
      const lockers=await get('lockers');
      let chatCount=0,chatErr=false;
      try{const c=await db.ref('chat').once('value');chatCount=c.numChildren();}catch(e){chatErr=true;}
      const errs=[];
      if(st.__err){errs.push('stats');delete st.__err;}
      if(polls.__err){errs.push('polls');delete polls.__err;}
      if(lockers.__err){errs.push('lockers');delete lockers.__err;}
      if(chatErr)errs.push('chat');

      // headline cards
      const day=new Date().toISOString().slice(0,10).replace(/-/g,'');
      const avgS=st.total?Math.round((st.duration||0)/st.total):0;
      const avg=avgS?(Math.floor(avgS/60)+'m '+(avgS%60)+'s'):'—';
      const cards=[['Total visits',st.total||0],['Unique devices',st.unique||0],['Visits today',(st.days||{})[day]||0],['Avg time on site',avg],['Chat messages',chatCount]];
      $('statCards').innerHTML=cards.map(c=>'<div style="border:1px solid var(--seam);border-radius:8px;padding:12px;background:#101015;text-align:center"><div style="font-size:26px;font-weight:800;color:var(--gold)">'+c[1]+'</div><div class="muted" style="font-size:12px">'+c[0]+'</div></div>').join('');

      // last 14 days
      const days=[];for(let i=13;i>=0;i--){const d=new Date(Date.now()-i*86400000);const k=d.toISOString().slice(0,10).replace(/-/g,'');days.push([d.toISOString().slice(5,10),(st.days||{})[k]||0]);}
      const dmax=Math.max(1,...days.map(x=>x[1]));
      $('statDays').innerHTML=days.map(x=>barRow(x[0],x[1],dmax)).join('');

      // views by section
      const vw=Object.entries(st.views||{}).sort((a,b)=>b[1]-a[1]);
      const vmax=Math.max(1,...vw.map(x=>x[1]));
      $('statViews').innerHTML=vw.length?vw.map(x=>barRow(x[0],x[1],vmax)).join(''):'<span class="muted">No data yet — starts counting once the tracking version of the site is live.</span>';

      // ticket clicks
      const tk=st.tickets||{};
      const ttypes=[['eventim','Lunacy Live (Eventim)'],['gathering','Gathering of the Juggalos']];
      let th='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px">';
      ttypes.forEach(([k,lbl])=>{
        const t=tk[k]||{};
        th+='<div style="border:1px solid var(--seam);border-radius:8px;padding:12px;background:#101015;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--gold)">'+(t.total||0)+'</div><div class="muted" style="font-size:12px">'+lbl+' · '+((t.days||{})[day]||0)+' today</div></div>';
      });
      th+='</div>';
      const tdays=[];for(let i=13;i>=0;i--){const d=new Date(Date.now()-i*86400000);const k2=d.toISOString().slice(0,10).replace(/-/g,'');
        tdays.push([d.toISOString().slice(5,10),ttypes.reduce((a,[k])=>a+(((tk[k]||{}).days||{})[k2]||0),0)]);}
      const tmax=Math.max(1,...tdays.map(x=>x[1]));
      if(tdays.some(x=>x[1]>0))th+=tdays.map(x=>barRow(x[0],x[1],tmax)).join('');
      $('statTickets').innerHTML=th;

      // episodes watched
      const fmtT=x=>{x=Math.round(x||0);return x>=3600?(Math.floor(x/3600)+'h '+Math.round(x%3600/60)+'m'):x>=60?(Math.floor(x/60)+'m '+(x%60)+'s'):(x+'s');};
      const eps=Object.entries(st.eps||{}).map(([id,v])=>({title:(v&&v.title)||id,plays:(v&&v.plays)||0,secs:(v&&v.secs)||0})).sort((a,b)=>b.secs-a.secs||b.plays-a.plays);
      const emax=Math.max(1,...eps.map(x=>x.secs));
      $('statEps').innerHTML=eps.length?eps.map(x=>{
        const pct=Math.round(x.secs/emax*100);
        const avg=x.plays?fmtT(x.secs/x.plays):'—';
        return '<div style="display:flex;align-items:center;gap:10px;margin:5px 0">'+
          '<div style="flex:0 0 160px;font-size:12.5px" class="muted">'+esc(x.title)+'</div>'+
          '<div style="flex:1;background:#000;border:1px solid var(--seam);border-radius:4px;height:16px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--acid)"></div></div>'+
          '<div style="flex:0 0 210px;text-align:right;font-size:12.5px"><b>'+x.plays+'</b> plays · <b>'+fmtT(x.secs)+'</b> watched · avg '+avg+'</div></div>';
      }).join(''):'<span class="muted">No plays yet — starts counting once the tracking version of the site is live.</span>';

      // vote results
      let ph='';
      Object.keys(polls).forEach(key=>{
        const meta=POLL_LABELS[key]||{q:key,o:[]};
        const t=polls[key]||{};
        const total=Object.values(t).reduce((a,b)=>a+(+b||0),0);
        ph+='<div class="item"><div style="font-weight:700;margin-bottom:6px">'+esc(meta.q)+' <span class="muted">('+total+' votes)</span></div>';
        const mx=Math.max(1,...Object.values(t).map(v=>+v||0));
        Object.keys(t).sort().forEach(i=>{
          const v=+t[i]||0;
          ph+=barRow(meta.o[i]||('Option '+i),v,mx,total?(' · '+Math.round(v/total*100)+'%'):'');
        });
        ph+='</div>';
      });
      $('statPolls').innerHTML=ph||'<span class="muted">No votes yet.</span>';

      // favorite wrestlers
      let favs=Object.entries(st.favs||{}).filter(x=>x[1]>0);
      if(!favs.length){
        const agg={};Object.values(lockers||{}).forEach(x=>{if(x&&x.fav)agg[x.fav]=(agg[x.fav]||0)+1;});
        favs=Object.entries(agg);
      }
      favs.sort((a,b)=>b[1]-a[1]);
      const fmax=Math.max(1,...favs.map(x=>x[1]));
      $('statFavs').innerHTML=favs.length?favs.slice(0,20).map(x=>barRow(x[0],x[1],fmax)).join(''):'<span class="muted">Nobody has picked a favorite yet.</span>';

      // top lockers
      const rows=Object.values(lockers||{}).filter(x=>x&&(x.pts||x.name)).sort((a,b)=>(b.pts||0)-(a.pts||0)).slice(0,15);
      $('statLockers').innerHTML=rows.length?rows.map((x,i)=>'<div style="display:flex;gap:10px;padding:4px 0;border-bottom:1px dashed var(--seam)"><span class="muted" style="flex:0 0 26px">#'+(i+1)+'</span><span style="flex:1">'+esc(x.name||'Anonymous Juggalo')+'</span><b style="color:var(--gold)">'+(x.pts||0)+' pts</b><span class="muted">'+(x.wins||0)+' wins</span></div>').join(''):'<span class="muted">No lockers synced yet.</span>';

      if(errs.length){
        $('rulesHint').style.display='block';
        status('Firebase rules are blocking: '+errs.join(', ')+' — see the fix at the bottom.','err');
      }else{
        $('rulesHint').style.display='none';
        status('Live · updated '+new Date().toLocaleTimeString(),'ok');
      }
    }catch(e){status('Error: '+e.message,'err');}
  }
  $('statsReload').onclick=statsLoad;
  statsLoad();
  setInterval(statsLoad,60000);
})();
</script>
</body>
</html>
